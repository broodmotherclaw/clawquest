name: Legacy Deploy Database to Supabase (Manual)

on:
  workflow_dispatch:

env:
  NODE_VERSION: '18'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RAW_DATABASE_URL: ${{ secrets.DATABASE_DIRECT_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
    outputs:
      database_status: ${{ steps.deploy.outputs.database_status }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install Prisma CLI
        run: npm install -g prisma
      
      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Normalize database URL
        run: |
          if [ -z "$RAW_DATABASE_URL" ]; then
            echo "❌ Missing required secret: DATABASE_DIRECT_URL"
            exit 1
          fi
          test -n "$SUPABASE_URL"
          NORMALIZED_DATABASE_URL="$(node backend/scripts/normalize-db-url.js "$RAW_DATABASE_URL" "$SUPABASE_URL")"

          test -n "$NORMALIZED_DATABASE_URL"
          echo "DATABASE_URL=$NORMALIZED_DATABASE_URL" >> "$GITHUB_ENV"
      
      - name: Generate Prisma Client
        working-directory: ./backend
        run: |
          echo "🔧 Generating Prisma Client..."
          npx prisma generate
      
      - name: Push database schema
        id: deploy
        working-directory: ./backend
        run: |
          echo "🚀 Pushing database schema to Supabase..."

          echo "🔌 Checking DB connectivity..."
          timeout 60 npx prisma db execute --stdin --url "$DATABASE_URL" < <(echo 'SELECT 1;')

          # Push schema (bounded to avoid hanging forever in CI)
          timeout 300 npx prisma db push --skip-generate --accept-data-loss

          echo "database_status=connected" >> $GITHUB_OUTPUT
      
      - name: Initialize wafers
        working-directory: ./backend
        run: |
          echo "🌟 Checking wafers..."
          # Prisma maps model Wafer to table "Wafer" and field isActive to "isActive".
          # Seed once if table exists and is empty.
          WAFER_COUNT=$(npx prisma db execute --stdin --url "$DATABASE_URL" < <(echo 'SELECT COUNT(*) AS count FROM "Wafer";') || true)
          echo "ℹ️  Current wafers count: $WAFER_COUNT"

          if [[ "$WAFER_COUNT" == *"count"* ]] && [[ "$WAFER_COUNT" == *"0"* ]]; then
            echo "🌟 Initializing wafers..."
            npx prisma db execute --stdin --url "$DATABASE_URL" < <(echo '
              INSERT INTO "Wafer" ("id","x","y","value","isActive")
              SELECT
                md5(random()::text || gs::text),
                floor(random()*75)::int,
                floor(random()*75)::int,
                floor(random()*100 + 1)::int,
                true
              FROM generate_series(1, 5000) AS gs
              ON CONFLICT ("x","y") DO NOTHING;
            ')
            echo "✅ Wafer initialization completed"
          else
            echo "ℹ️  Wafers already exist or table not ready, skipping initialization"
          fi
      
      - name: Verify database
        working-directory: ./backend
        run: |
          echo ""
          echo "🔍 Verifying database schema..."
          
          # Check agents table
          AGENT_COUNT=$(npx prisma db execute --stdin --url "$DATABASE_URL" < <(echo 'SELECT COUNT(*) as count FROM "Agent";'))
          echo "   ✅ Agents table: $AGENT_COUNT rows"
          
          # Check wafers table
          WAFER_COUNT=$(npx prisma db execute --stdin --url "$DATABASE_URL" < <(echo 'SELECT COUNT(*) as count FROM "Wafer";'))
          echo "   ✅ Wafers table: $WAFER_COUNT rows"
          
          echo ""
          echo "✅ Database deployment successful!"
      
      - name: Deployment success
        if: success()
        run: |
          echo "✅ Database deployed successfully!"
          echo "🌐 Database: Supabase PostgreSQL"
          echo "📋 Schema version: ${{ github.sha }}"
      
      - name: Rollback on failure
        if: failure()
        working-directory: ./backend
        run: |
          echo "⚠️  Migration failed. Automatic rollback disabled to prevent destructive reset."
          echo "🛠️  Please inspect logs and fix forward with a new migration/db push."
