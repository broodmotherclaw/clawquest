services:
  postgres:
    image: postgres:16-alpine
    container_name: hexclaw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hexclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-password}
      POSTGRES_DB: ${POSTGRES_DB:-hexclaw}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hexclaw-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hexclaw} -d ${POSTGRES_DB:-hexclaw}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hexclaw-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://hexclaw:change-this-password@postgres:5432/hexclaw?schema=public}
      PORT: ${BACKEND_PORT:-3001}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      OPENCLAW_BOT_SECRET: ${OPENCLAW_BOT_SECRET:-change-this-bot-secret}
      SHARED_SECRET: ${SHARED_SECRET:-change-this-shared-secret}
      AI_PROVIDER: ${AI_PROVIDER:-glm}
      GLM_API_KEY: ${GLM_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy || npx prisma db push --skip-generate --accept-data-loss;
      node dist/index.js"
    networks:
      - hexclaw-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/}
        VITE_OUT_DIR: ${VITE_OUT_DIR:-dist}
    container_name: hexclaw-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - hexclaw-network

volumes:
  postgres_data:

networks:
  hexclaw-network:
    driver: bridge
